name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger for re-runs / hotfixes

# Prevent concurrent deployments on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

