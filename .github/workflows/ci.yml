name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME:        ${{ secrets.DOCKER_USERNAME }}/devops-app
  IMAGE_TAR:         /tmp/app-${{ github.sha }}.tar
  SHA_TAG:           ${{ secrets.DOCKER_USERNAME }}/devops-app:sha-${{ github.sha }}
  PROD_TAG:          ${{ secrets.DOCKER_USERNAME }}/devops-app:prod
  TRIVY_REPORT_PATH: trivy-report.json
  ARGOCD_DEV_APP:    devops-app-dev
  ARGOCD_PROD_APP:   devops-app-prod

# ──────────────────────────────────────────────────────────
# JOB 1 — BUILD
# Builds image once, saves to /tmp tar on self-hosted runner.
# No upload/download roundtrip — direct /tmp access.
# ──────────────────────────────────────────────────────────
jobs:
  build:
    name: 🏗️ Build Docker Image
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image (load only, no push)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.SHA_TAG }}
          cache-from: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops-app:cache-${{ github.ref_name }}
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops-app:cache-main
            type=gha,scope=buildkit-${{ github.ref_name }}
            type=gha,scope=buildkit-main
          cache-to: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops-app:cache-${{ github.ref_name }},mode=max
            type=gha,scope=buildkit-${{ github.ref_name }},mode=max

      - name: Export Image as Tar to /tmp
        run: |
          docker save ${{ env.SHA_TAG }} -o ${{ env.IMAGE_TAR }}
          echo "📦 Saved: $(du -sh ${{ env.IMAGE_TAR }} | cut -f1)"

  # ──────────────────────────────────────────────────────────
  # JOB 2 — SECURITY SCAN
  # Loads tar, runs Trivy, parses CVE counts, hard-fails on
  # HIGH/CRITICAL so downstream jobs skip automatically.
  # ──────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Trivy Security Scan
    runs-on: self-hosted
    needs: build
    outputs:
      scan-status: ${{ steps.set-result.outputs.result }}
      high-count:  ${{ steps.set-result.outputs.high }}
      crit-count:  ${{ steps.set-result.outputs.critical }}
      total-count: ${{ steps.set-result.outputs.total }}

    steps:
      - name: Load Docker Image
        run: docker load -i ${{ env.IMAGE_TAR }}

      - name: Run Trivy Scan (JSON + hard fail on findings)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $GITHUB_WORKSPACE:/output \
            aquasec/trivy:0.69.1 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output /output/${{ env.TRIVY_REPORT_PATH }} \
            --exit-code 1 \
            ${{ env.SHA_TAG }}

      - name: Debug — Print Trivy Report
        if: always()
        run: |
          echo "📄 Report: $GITHUB_WORKSPACE/${{ env.TRIVY_REPORT_PATH }}"
          cat $GITHUB_WORKSPACE/${{ env.TRIVY_REPORT_PATH }} | jq '.Results | length'

      - name: Parse Report & Set Outputs
        id: set-result
        if: always()
        run: |
          REPORT="$GITHUB_WORKSPACE/${{ env.TRIVY_REPORT_PATH }}"

          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$REPORT")
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$REPORT")
          TOTAL=$((HIGH + CRITICAL))

          echo "high=$HIGH"         >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT

          if [ "$TOTAL" -gt 0 ]; then
            echo "result=fail" >> $GITHUB_OUTPUT
            echo "❌ Scan FAILED — HIGH: $HIGH | CRITICAL: $CRITICAL | Total: $TOTAL"
          else
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "✅ Scan PASSED — no HIGH/CRITICAL vulnerabilities."
          fi

      - name: Upload Trivy JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report
          path: ${{ env.TRIVY_REPORT_PATH }}
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 3 — PUBLISH
  # scan PASSED → push SHA tag + prod tag
  # scan FAILED → push SHA tag only (quarantine for audit trail)
  # ──────────────────────────────────────────────────────────
  publish:
    name: 📦 Publish Image
    runs-on: self-hosted
    needs: security-scan
    if: always() && needs.security-scan.result != 'cancelled'

    steps:
      - name: Load Docker Image
        run: docker load -i ${{ env.IMAGE_TAR }}

      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push SHA-tagged Image (always — quarantine/audit trail)
        run: |
          docker push ${{ env.SHA_TAG }}
          echo "📤 Pushed: ${{ env.SHA_TAG }}"

      - name: Promote to :prod Tag (scan passed only)
        # if: needs.security-scan.outputs.scan-status == 'pass'
        run: |
          docker tag ${{ env.SHA_TAG }} ${{ env.PROD_TAG }}
          docker push ${{ env.PROD_TAG }}
          echo "🚀 Promoted to prod: ${{ env.PROD_TAG }}"

      - name: Log Quarantine (scan failed)
        if: needs.security-scan.result != 'success'
        run: |
          echo "⚠️ Scan failed — image NOT promoted to :prod"
          echo "🔖 Quarantined at: ${{ env.SHA_TAG }}"

      - name: Cleanup Tar
        if: always()
        run: rm -f ${{ env.IMAGE_TAR }}

  # ──────────────────────────────────────────────────────────
  # JOB 4 — SYNC DEV
  # Runs even when scan fails — dev env always gets latest SHA.
  # ArgoCD picks up the sha-tagged image in values-dev.yaml.
  # ──────────────────────────────────────────────────────────
  sync-dev:
    name: 🔀 Sync Dev Environment
    runs-on: self-hosted
    needs: publish
    if: always() && needs.publish.result == 'success'

    steps:

      # Copies fresh kubeconfig from Windows and fixes host IP for WSL.
      # Required on every run — KinD recreates certs on each cluster start.
      - name: Fix kubeconfig for WSL
        uses: ./.github/actions/fix-kubeconfig

      - name: Update Tag & Trigger Dev Sync
        run: |
          # Patching both the Helm parameter for the unique tag AND triggering the sync
          kubectl patch application ${{ env.ARGOCD_DEV_APP }} \
            -n argocd \
            --type merge \
            -p '{
              "spec": {
                "source": {
                  "helm": {
                    "parameters": [
                      {"name": "image.tag", "value": "sha-${{ github.sha }}"}
                    ]
                  }
                }
              },
              "operation": {
                "initiatedBy": {"username": "ci-runner"},
                "sync": {
                  "prune": true,
                  "syncOptions": ["CreateNamespace=true"],
                  "revisions": ["HEAD"]
                }
              }
            }'
          echo "🔄 Dev sync triggered with dynamic tag: sha-${{ github.sha }}"

      - name: Wait for Dev Sync (3 min timeout)
        run: |
          for i in $(seq 1 18); do
            STATUS=$(kubectl get application ${{ env.ARGOCD_DEV_APP }} -n argocd \
              -o jsonpath='{.status.sync.status}')
            HEALTH=$(kubectl get application ${{ env.ARGOCD_DEV_APP }} -n argocd \
              -o jsonpath='{.status.health.status}')

            echo "Attempt $i/18 — Sync: $STATUS | Health: $HEALTH"

            if [ "$STATUS" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ Dev — Synced and Healthy!"
              exit 0
            fi

            sleep 10
          done

            if [ "$HEALTH" = "Degraded" ]; then
              echo "❌ Dev — Application Degraded."
              exit 1
            fi

          echo "❌ Dev sync timed out."
          exit 1

  # ──────────────────────────────────────────────────────────
  # JOB 5 — DEPLOY PROD
  # Only runs when scan passed + image promoted to :prod.
  # Syncs prod ArgoCD app and polls until Healthy.
  # ──────────────────────────────────────────────────────────
  deploy-prod:
    name: 🚀 Deploy to Production
    runs-on: self-hosted
    needs: [security-scan, publish]
    if: needs.security-scan.result == 'success' && needs.publish.result == 'success'
    environment: production

    steps:

      # Copies fresh kubeconfig from Windows and fixes host IP for WSL.
      # Required on every run — KinD recreates certs on each cluster start.

      - name: Fix kubeconfig for WSL
        uses: ./.github/actions/fix-kubeconfig
        
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Hard Refresh Prod App
        run: |
          kubectl annotate application ${{ env.ARGOCD_PROD_APP }} \
            -n argocd \
            argocd.argoproj.io/refresh=hard \
            --overwrite
          echo "🔄 Prod refresh triggered: ${{ env.ARGOCD_PROD_APP }}"

      - name: Trigger Prod Sync
        run: |
          kubectl patch application ${{ env.ARGOCD_PROD_APP }} \
            -n argocd \
            --type merge \
            -p '{"operation":{"initiatedBy":{"username":"ci-runner"},"sync":{"prune":true,"syncOptions":["CreateNamespace=true"],"revisions":["HEAD"]}}}'

      - name: Wait for Prod Sync (5 min timeout)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(kubectl get application ${{ env.ARGOCD_PROD_APP }} -n argocd \
              -o jsonpath='{.status.sync.status}')
            HEALTH=$(kubectl get application ${{ env.ARGOCD_PROD_APP }} -n argocd \
              -o jsonpath='{.status.health.status}')

            echo "Attempt $i/30 — Sync: $STATUS | Health: $HEALTH"

            if [ "$STATUS" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ Prod — Synced and Healthy!"
              exit 0
            fi

            if [ "$HEALTH" = "Degraded" ]; then
              echo "❌ Prod — Application Degraded."
              exit 1
            fi

            sleep 10
          done
          echo "❌ Prod sync timed out."
          exit 1

      - name: Verify Final Status
        run: |
          STATUS=$(kubectl get application ${{ env.ARGOCD_PROD_APP }} -n argocd \
            -o jsonpath='{.status.sync.status}')
          HEALTH=$(kubectl get application ${{ env.ARGOCD_PROD_APP }} -n argocd \
            -o jsonpath='{.status.health.status}')
          echo "Sync: $STATUS | Health: $HEALTH"

      - name: Print Managed Resources
        run: |
          kubectl get application ${{ env.ARGOCD_PROD_APP }} -n argocd \
            -o jsonpath='{range .status.resources[*]}{.kind}/{.name} — {.status}{"\n"}{end}'

  # ──────────────────────────────────────────────────────────
  # JOB 6 — NOTIFY
  # A) Scan failed      → security alert with CVE counts
  # B) Deploy succeeded → success summary
  # C) Deploy failed    → infra/ArgoCD issue (image was clean)
  # ──────────────────────────────────────────────────────────
  notify:
    name: 📢 Slack Notification
    runs-on: ubuntu-latest
    needs: [security-scan, publish, sync-dev, deploy-prod]
    if: always()

    steps:
      - name: Notify — Scan Failed (security alert)
        if: needs.security-scan.outputs.scan-status == 'fail'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: danger
          SLACK_TITLE: "🚨 Security Gate Blocked Deployment"
          SLACK_MESSAGE: |
            *Repo:*   ${{ github.repository }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}

            *Vulnerabilities Found:*
            • HIGH:     ${{ needs.security-scan.outputs.high-count }}
            • CRITICAL: ${{ needs.security-scan.outputs.crit-count }}
            • Total:    ${{ needs.security-scan.outputs.total-count }}

            *Image quarantined at:*
            `${{ secrets.DOCKER_USERNAME }}/devops-app:sha-${{ github.sha }}`

            ⛔ NOT promoted to :prod — ArgoCD prod sync skipped.
            ✅ Dev environment synced with quarantined SHA image.
            📄 Download Trivy report artifact for full details.

      - name: Notify — Deploy Succeeded
        if: needs.deploy-prod.result == 'success'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: good
          SLACK_TITLE: "✅ Production Deployment Successful"
          SLACK_MESSAGE: |
            *Repo:*   ${{ github.repository }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}

            *Images pushed:*
            • `${{ secrets.DOCKER_USERNAME }}/devops-app:sha-${{ github.sha }}`
            • `${{ secrets.DOCKER_USERNAME }}/devops-app:prod`

            *ArgoCD Dev:*  `devops-app-dev`  — Synced ✅
            *ArgoCD Prod:* `devops-app-prod` — Synced & Healthy ✅

      - name: Notify — Deploy Failed (infra/ArgoCD issue)
        if: needs.security-scan.outputs.scan-status == 'pass' && needs.deploy-prod.result == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: warning
          SLACK_TITLE: "⚠️ Deploy Failed (image is clean)"
          SLACK_MESSAGE: |
            *Repo:*   ${{ github.repository }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}

            ✅ Security scan passed — no HIGH/CRITICAL vulnerabilities.
            ✅ Image promoted and pushed to Docker Hub.
            ❌ ArgoCD prod sync failed or timed out.

            *Images available:*
            • `${{ secrets.DOCKER_USERNAME }}/devops-app:sha-${{ github.sha }}`
            • `${{ secrets.DOCKER_USERNAME }}/devops-app:prod`

            Check ArgoCD UI or runner logs for details.