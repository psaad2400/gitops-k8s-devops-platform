  IMAGE_TAG: v1
  FULL_IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-app:v1
  ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}       # e.g. argocd.yourdomain.com or localhost:8080
  ARGOCD_APP_NAME: devops-app                        # Your ArgoCD Application name
  TRIVY_REPORT_PATH: trivy-report.json

