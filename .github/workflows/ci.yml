# ============================================================
# Production-Grade CI/CD Pipeline
# Stack: GitHub Actions → Docker Buildx → Trivy 

name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger for re-runs / hotfixes

# Prevent concurrent deployments on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────
# Environment-level variables (shared across jobs)
# ──────────────────────────────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-app
  IMAGE_TAG: v1
  FULL_IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-app:v1
  ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}       # e.g. argocd.yourdomain.com or localhost:8080
  ARGOCD_APP_NAME: devops-app                        # Your ArgoCD Application name
  TRIVY_REPORT_PATH: trivy-report.json

jobs:

  # ════════════════════════════════════════════
  # JOB 1: BUILD
  # Builds Docker image using Buildx, caches layers.
  # Does NOT push yet — push only happens after scan passes.
  # ════════════════════════════════════════════
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      # ── 1. Checkout source code ──
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU for multi-arch support (good practice even for single-arch) ──
      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx for advanced build features + layer caching ──
      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      # ── 4. Authenticate with Docker Hub ──
      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 5. Build image and export to Docker daemon for Trivy to scan locally.
      #       We use `load: true` and skip push here — push is gated by scan result.
      #       Cache layers are stored in GitHub Actions cache for faster rebuilds. ──
      - name: Build Docker Image (No Push)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64
          push: false                    # ← Explicitly NOT pushing before scan
          load: true                     # ← Load into local Docker daemon for Trivy
          tags: ${{ env.FULL_IMAGE }}
          cache-from: type=gha           # GitHub Actions cache (free, fast)
          cache-to: type=gha,mode=max

      # ── 6. Save image as a tar for the scan job to consume ──
      - name: Export Image as Tar
        run: |
          docker save ${{ env.FULL_IMAGE }} -o /tmp/app-image.tar
          echo "Image saved: $(du -sh /tmp/app-image.tar | cut -f1)"

      # ── 7. Upload image tar as artifact (shared between jobs) ──
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/app-image.tar
          retention-days: 1              # Short-lived — only needed within this run

  # ════════════════════════════════════════════
  # JOB 2: SECURITY SCAN
  # Downloads built image, runs Trivy, fails on HIGH/CRITICAL.
  # Generates a JSON report saved as a pipeline artifact.
  # ════════════════════════════════════════════
  security-scan:
    name: 🔒 Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    outputs:
      scan-result: ${{ steps.set-result.outputs.result }}  # 'pass' or 'fail'

    steps:
      # ── 1. Checkout (needed for any helper scripts) ──
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Pull the built image artifact from the build job ──
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp/

      # ── 3. Load the image into Docker daemon ──
      - name: Load Docker Image
        run: |
          docker load -i /tmp/app-image.tar
          docker images | grep devops-app

      # ── 4. Run Trivy scan — output JSON report.
      #       exit-code: 0 here so the step doesn't auto-fail;
      #       we control the failure logic explicitly below. ──
      # - name: Run Trivy Vulnerability Scan (JSON Report)
      #   uses: aquasecurity/trivy-action@0.33.1
      #   with:
      #     image-ref: ${{ env.FULL_IMAGE }}
      #     format: json
      #     output: ${{ env.TRIVY_REPORT_PATH }}
      #     severity: HIGH,CRITICAL
      #     exit-code: '0'                 # Don't fail here — we parse the report below
      #     ignore-unfixed: false          # Report unfixed vulns too
      #     vuln-type: os,library          # Scan OS packages AND app libraries

      # # ── 5. Also generate a human-readable table summary for logs ──
      # - name: Trivy Table Summary (Logs)
      #   uses: aquasecurity/trivy-action@0.33.1
      #   with:
      #     image-ref: ${{ env.FULL_IMAGE }}
      #     format: table
      #     severity: HIGH,CRITICAL
      #     exit-code: '0'
      #     ignore-unfixed: false
      #     vuln-type: os,library

      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@v0.2.0
        with:
          cache: true
          version: v0.69.3

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FULL_IMAGE }}
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          vuln-type: os,library
          skip-setup-trivy: true

      # ── 6. Parse report — count HIGH/CRITICAL vulns and set outputs ──
      - name: Parse Trivy Report & Set Result
        id: set-result
        run: |
          # Count HIGH and CRITICAL vulnerabilities
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' ${{ env.TRIVY_REPORT_PATH }} 2>/dev/null || echo "0")
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' ${{ env.TRIVY_REPORT_PATH }} 2>/dev/null || echo "0")
          TOTAL=$((HIGH + CRITICAL))

          echo "HIGH vulnerabilities: $HIGH"
          echo "CRITICAL vulnerabilities: $CRITICAL"
          echo "Total HIGH/CRITICAL: $TOTAL"

          # Export as env vars for the Slack notification step
          echo "HIGH_COUNT=$HIGH"       >> $GITHUB_ENV
          echo "CRITICAL_COUNT=$CRITICAL" >> $GITHUB_ENV
          echo "TOTAL_VULNS=$TOTAL"     >> $GITHUB_ENV

          # Set job output based on findings
          if [ "$TOTAL" -gt 0 ]; then
            echo "result=fail" >> $GITHUB_OUTPUT
            echo "❌ Scan FAILED — $TOTAL HIGH/CRITICAL vulnerabilities found."
          else
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "✅ Scan PASSED — No HIGH/CRITICAL vulnerabilities found."
          fi

      # ── 7. Upload the JSON report as an artifact (always, even on failure) ──
      - name: Upload Trivy JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report
          path: ${{ env.TRIVY_REPORT_PATH }}
          retention-days: 30            # Retain for 30 days for audit/compliance

      # ── 8. Fail the job if vulnerabilities were found (explicit failure gate) ──
      - name: Enforce Security Gate
        if: steps.set-result.outputs.result == 'fail'
        run: |
          echo "::error::Security gate FAILED. ${{ env.TOTAL_VULNS }} HIGH/CRITICAL vulnerabilities detected."
          echo "::error::HIGH: ${{ env.HIGH_COUNT }} | CRITICAL: ${{ env.CRITICAL_COUNT }}"
          echo "Review the Trivy report artifact for full details."
          exit 1

  # ════════════════════════════════════════════
  # JOB 3: PUBLISH IMAGE
  # Only runs if scan passed. Pushes image to Docker Hub.
  # ════════════════════════════════════════════
  publish:
    name: 📦 Push Image to Registry
    runs-on: ubuntu-latest
    needs: security-scan              # Only runs if security-scan succeeds (exit 0)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Rebuild + push. Buildx layer cache means this is near-instant. ──
      # NOTE: We rebuild (not re-upload tar) because image tars don't preserve
      # Buildx multi-platform manifests and provenance attestations cleanly.
      - name: Build & Push Verified Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64
          push: true                    # ← Push ONLY after scan passed
          tags: |
            ${{ env.FULL_IMAGE }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha          # Reuses cached layers from build job
          cache-to: type=gha,mode=max
          provenance: true              # Generate SLSA provenance attestation
          sbom: true                    # Generate Software Bill of Materials

      - name: Image Push Confirmed
        run: |
          echo "✅ Image pushed: ${{ env.FULL_IMAGE }}"
          echo "✅ Image pushed: ${{ env.IMAGE_NAME }}:latest"

